<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康紀錄（BMI 計算）</title>
    <style>
        body {
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            padding: 20px;
            background: #f8f9fa;
        }

        h2 {
            margin-top: 20px;
        }

        input {
            width: 220px;
            padding: 8px;
            margin: 5px 0 15px 0;
            display: block;
        }

        button {
            padding: 10px 15px;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px 0;
        }

        button:hover {
            background-color: #0056b3;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        #result {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .underweight {
            color: #17a2b8;
        }

        .normal {
            color: #28a745;
        }

        .overweight {
            color: #fd7e14;
        }

        .obese {
            color: #dc3545;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 500px;
            background: white;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        #history div {
            margin-bottom: 8px;
            padding: 10px;
            background: #ffffff;
            border-left: 5px solid #007bff;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>健康紀錄（BMI 計算）</h2>

    <label>身高 (cm)</label>
    <input type="number" id="height" placeholder="請輸入身高">

    <label>體重 (kg)</label>
    <input type="number" id="weight" placeholder="請輸入體重">

    <button onclick="saveRecord()">儲存紀錄</button>

    <div id="result"></div>
</div>

<div class="card">
    <h2>BMI 標準參考</h2>

    <table>
        <tr>
            <th>BMI 範圍</th>
            <th>狀態</th>
        </tr>
        <tr>
            <td>&lt; 18.5</td>
            <td class="underweight">過輕</td>
        </tr>
        <tr>
            <td>18.5 - 23.9</td>
            <td class="normal">正常</td>
        </tr>
        <tr>
            <td>24 - 26.9</td>
            <td class="overweight">過重</td>
        </tr>
        <tr>
            <td>≧ 27</td>
            <td class="obese">肥胖</td>
        </tr>
    </table>
</div>

<div class="card">
    <h2>歷史紀錄</h2>
    <div id="history">讀取中...</div>
</div>

<button onclick="window.location.href='dashboard.html'">回首頁</button>

<script>
// -----------------------------------------
// ⭐ BMI 狀態判定
// -----------------------------------------
function getBmiStatus(bmi) {
    bmi = Number(bmi);

    if (bmi < 18.5) {
        return "過輕";
    } else if (bmi < 24) {
        return "正常";
    } else if (bmi < 27) {
        return "過重";
    } else {
        return "肥胖";
    }
}

// -----------------------------------------
// ⭐ BMI 狀態顏色
// -----------------------------------------
function getBmiClass(bmi) {
    bmi = Number(bmi);

    if (bmi < 18.5) {
        return "underweight";
    } else if (bmi < 24) {
        return "normal";
    } else if (bmi < 27) {
        return "overweight";
    } else {
        return "obese";
    }
}

// -----------------------------------------
// ⭐ 儲存 BMI 紀錄（POST /api/health_records）
// -----------------------------------------
async function saveRecord() {
    const height = document.getElementById("height").value;
    const weight = document.getElementById("weight").value;

    if (!height || !weight) {
        alert("請輸入身高與體重！");
        return;
    }

    if (Number(height) <= 0 || Number(weight) <= 0) {
        alert("身高與體重必須大於 0！");
        return;
    }

    const bmi = (weight / ((height / 100) ** 2)).toFixed(2);
    const bmiStatus = getBmiStatus(bmi);
    const bmiClass = getBmiClass(bmi);

    const result = document.getElementById("result");
    result.className = bmiClass;
    result.innerHTML = `BMI：${bmi}　狀態：${bmiStatus}`;

    const token = localStorage.getItem("token");
    if (!token) {
        alert("尚未登入！");
        return;
    }

    const res = await fetch("/api/health_records", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            height: Number(height),
            weight: Number(weight),
            bmi: Number(bmi)
        })
    });

    const data = await res.json();

    alert(`BMI：${bmi}\n狀態：${bmiStatus}\n\n${data.message}`);

    loadRecords();
}

// -----------------------------------------
// ⭐ 載入健康紀錄（GET /api/health_records）
// -----------------------------------------
async function loadRecords() {
    const token = localStorage.getItem("token");

    if (!token) {
        document.getElementById("history").innerHTML = "尚未登入，無法讀取紀錄";
        return;
    }

    const res = await fetch("/api/health_records", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const records = await res.json();

    const list = document.getElementById("history");
    list.innerHTML = "";

    if (!records || records.length === 0) {
        list.innerHTML = "目前沒有紀錄";
        return;
    }

    records.forEach(r => {
        const div = document.createElement("div");
        const status = getBmiStatus(r.bmi);
        const statusClass = getBmiClass(r.bmi);

        div.innerHTML = `
            ${r.created_at}｜
            身高：${r.height}cm｜
            體重：${r.weight}kg｜
            BMI：${r.bmi}
            <span class="${statusClass}">（${status}）</span>
        `;

        list.appendChild(div);
    });
}

loadRecords();
</script>

</body>
</html>
