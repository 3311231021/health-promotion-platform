<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>地圖運動紀錄</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            background: #f5f5f5;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        #map {
            height: 300px;
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.12);
        }

        .label {
            font-weight: bold;
        }

        .value {
            font-family: Consolas, monospace;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            font-size: 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        #btnStart { background: #007bff; color: white; }
        #btnSave  { background: #28a745; color: white; }
        #btnBack  { background: #6c757d; color: white; }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<h2>📱 地圖 + 計步運動紀錄</h2>

<div id="map"></div>

<div class="card">
    <p><span class="label">⏱ 運動時間：</span><span id="timeText" class="value">00:00</span></p>
    <p><span class="label">🧍‍♂️ 步數：</span><span id="steps" class="value">0</span> 步</p>
    <p><span class="label">🛣️ 移動距離：</span><span id="distance" class="value">0.0</span> 公尺</p>
    <p><span class="label">📍 位置：</span><span id="status" class="value">等待定位中...</span></p>
    <p><span class="label">🛰️ 精度：</span><span id="accText" class="value">--</span> m</p>
</div>

<div class="btn-row">
    <button id="btnStart">開始運動</button>
    <button id="btnSave" disabled>確認並儲存紀錄</button>
</div>

<button id="btnBack">回儀表板</button>

<script>
/* ================================
   1. 地圖初始化
================================ */
const INIT_LAT = 24.136873;
const INIT_LNG = 120.685017;

const map = L.map("map").setView([INIT_LAT, INIT_LNG], 16);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
}).addTo(map);

let marker = L.marker([INIT_LAT, INIT_LNG]).addTo(map);
let path = [];
let polyline = null;
let totalDistance = 0;
let firstFix = true;
let watchId = null;

/* ================================
   2. 距離計算
================================ */
function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* ================================
   3. GPS
================================ */
function startGPS() {
    watchId = navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude, accuracy } = pos.coords;

        document.getElementById("status").innerText =
            `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
        document.getElementById("accText").innerText = accuracy.toFixed(1);

        if (firstFix) {
            map.setView([latitude, longitude], 18);
            marker.setLatLng([latitude, longitude]);
            path = [[latitude, longitude]];
            firstFix = false;
            return;
        }

        if (accuracy > 25) return;

        marker.setLatLng([latitude, longitude]);
        path.push([latitude, longitude]);

        if (polyline) map.removeLayer(polyline);
        polyline = L.polyline(path).addTo(map);

        const p1 = path[path.length - 2];
        const p2 = path[path.length - 1];
        totalDistance += getDistance(p1[0], p1[1], p2[0], p2[1]);
        document.getElementById("distance").innerText = totalDistance.toFixed(1);

    }, err => alert(err.message), {
        enableHighAccuracy: true
    });
}

function stopGPS() {
    if (watchId) navigator.geolocation.clearWatch(watchId);
}

/* ================================
   4. 計步
================================ */
let steps = 0;
let lastPeak = 0;

function onMotion(e) {
    const acc = e.acceleration;
    if (!acc) return;
    const total = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
    if (total > 18 && Date.now() - lastPeak > 300) {
        steps++;
        lastPeak = Date.now();
        document.getElementById("steps").innerText = steps;
    }
}

/* ================================
   5. 計時
================================ */
let startTime = null;
let timerId = null;

function startTimer() {
    startTime = Date.now();
    timerId = setInterval(() => {
        const sec = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById("timeText").innerText =
            `${String(Math.floor(sec / 60)).padStart(2, "0")}:${String(sec % 60).padStart(2, "0")}`;
    }, 1000);
}

function stopTimer() {
    clearInterval(timerId);
}

/* ================================
   6. 按鈕
================================ */
btnStart.onclick = () => {
    steps = totalDistance = 0;
    path = [];
    firstFix = true;
    startGPS();
    window.addEventListener("devicemotion", onMotion);
    startTimer();
    btnStart.disabled = true;
    btnSave.disabled = false;
};

btnSave.onclick = () => {
    stopGPS();
    stopTimer();
    window.removeEventListener("devicemotion", onMotion);
    alert("運動紀錄完成！（未使用登入）");
};

btnBack.onclick = () => {
    history.back();
};
</script>

</body>
</html>
